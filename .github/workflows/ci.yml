name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review, closed]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      neon_branch_name: ${{ steps.branch_name.outputs.name }}
    steps:
      - name: Build Neon PR branch name
        id: branch_name
        shell: bash
        run: |
          # lowercase, replace invalid chars with '-', trim repeated '-', cap length
          slug="$(echo "${{ github.head_ref }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//; s/-+/-/g' \
            | cut -c1-40)"
          echo "name=pr-worker-${{ github.event.pull_request.number }}-${slug}" >> "$GITHUB_OUTPUT"

  unit-test:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Manage dependencies
        run: go mod tidy

      - name: Unit test
        run: make test

  integration-test:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Manage dependencies
        run: go mod tidy

      - name: Download Encore CLI script
        uses: sozo-design/curl@v1.0.2
        with:
          args: --output install.sh -L https://encore.dev/install.sh

      - name: Install Encore CLI
        run: bash install.sh

      - name: Setup export path
        run: |
          echo "ENCORE_INSTALL=$HOME/.encore" >> $GITHUB_ENV
          echo "$HOME/.encore/bin" >> $GITHUB_PATH

      - name: Encore Auth
        run: encore auth login --auth-key ${{ secrets.ENCORE_AUTH_KEY }}

      - name: Ensure Neon PR branch exists
        id: neon_create
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ${{ needs.prepare.outputs.neon_branch_name }}
          parent_branch: production
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Reset Neon PR branch from parent
        id: neon_reset
        uses: neondatabase/reset-branch-action@v1
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ${{ needs.prepare.outputs.neon_branch_name }}
          parent: true
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Generate .secrets.local.cue
        run: |
          cat <<EOF > .secrets.local.cue
          LunarReminderDatabase: "${{ steps.neon_reset.outputs.db_url }}"
          JwtSecret: "${{ secrets.JWT_SECRET }}"
          MailgunApiKey: "${{ secrets.MAILGUN_API_KEY }}"
          MailgunSandBox: "${{ vars.MAILGUN_SANDBOX }}"
          EOF

      - name: Run integration tests
        env:
          ENCORE_RUNTIME_ENV: local
        run: make test-integration

  cleanup-neon-branch:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Delete Neon PR branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ${{ needs.prepare.outputs.neon_branch_name }}
          api_key: ${{ secrets.NEON_API_KEY }}
